<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flash Quote Generator</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    transition: 0.4s;
  }

  body.dark {
    background: #121212;
  }

  .container {
    width: 420px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    color: #222;
    transition: 0.4s;
  }

  body.dark .container {
    background: rgba(30,30,30,0.6);
    color: #fff;
  }

  h1 {
    margin-bottom: 20px;
  }

  .quote {
    font-size: 18px;
    margin-bottom: 15px;
    min-height: 60px;
    opacity: 1;
    transition: opacity 0.5s;
  }

  .author {
    font-style: italic;
    margin-bottom: 20px;
    color: gray;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #007bff;
    color: white;
    transition: 0.3s;
  }

  button:hover {
    background: #0056b3;
  }

  .dark-toggle {
    background: #222;
  }

</style>
</head>

<body>

<div class="container">
  <h1>Flash Quote Generator ⚡</h1>

  <div class="quote" id="quoteText"></div>
  <div class="author" id="quoteAuthor"></div>

  <div class="buttons">
    <button onclick="newQuote()">New Quote</button>
    <button onclick="copyQuote()">Copy</button>
    <button onclick="shareQuote()">Share</button>
    <button class="dark-toggle" onclick="toggleDark()">Dark Mode</button>
  </div>
</div>

<script>
const quotes = [
  { text: "The best way to get started is to quit talking and begin doing.", author: "Walt Disney" },
  { text: "Success is not final, failure is not fatal.", author: "Winston Churchill" },
  { text: "Don’t let yesterday take up too much of today.", author: "Will Rogers" },
  { text: "Your time is limited, so don’t waste it living someone else’s life.", author: "Steve Jobs" },
  { text: "Believe you can and you’re halfway there.", author: "Theodore Roosevelt" },
  { text: "Dream big and dare to fail.", author: "Norman Vaughan" }
];

const quoteText = document.getElementById("quoteText");
const quoteAuthor = document.getElementById("quoteAuthor");

let currentQuote = {};

function newQuote() {
  quoteText.style.opacity = 0;

  setTimeout(() => {
    const random = Math.floor(Math.random() * quotes.length);
    currentQuote = quotes[random];

    quoteText.textContent = `"${currentQuote.text}"`;
    quoteAuthor.textContent = `– ${currentQuote.author}`;

    quoteText.style.opacity = 1;
  }, 300);
}

function copyQuote() {
  const text = `"${currentQuote.text}" – ${currentQuote.author}`;
  navigator.clipboard.writeText(text);
  alert("Quote copied!");
}

function shareQuote() {
  const text = `"${currentQuote.text}" – ${currentQuote.author}`;

  if (navigator.share) {
    navigator.share({
      title: "Quote",
      text: text
    });
  } else {
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
  }
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

// first load
newQuote();
</script>

</body>
</html>
